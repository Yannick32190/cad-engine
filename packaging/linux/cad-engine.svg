<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <!-- 3D cube wireframe -->
  <g stroke="white" stroke-width="6" fill="none" stroke-linejoin="round">
    <!-- Front face -->
    <polygon points="60,100 128,65 196,100 128,135" fill="rgba(255,255,255,0.15)"/>
    <!-- Left face -->
    <polygon points="60,100 128,135 128,200 60,165" fill="rgba(255,255,255,0.08)"/>
    <!-- Right face -->
    <polygon points="196,100 128,135 128,200 196,165" fill="rgba(255,255,255,0.22)"/>
  </g>
  <!-- Pencil/sketch accent -->
  <line x1="85" y1="185" x2="170" y2="185" stroke="#60a5fa" stroke-width="4" stroke-dasharray="8,4"/>
  <!-- Corner markers -->
  <circle cx="128" cy="65" r="5" fill="#60a5fa"/>
  <circle cx="60" cy="100" r="5" fill="#60a5fa"/>
  <circle cx="196" cy="100" r="5" fill="#60a5fa"/>
</svg>
